<!DOCTYPE html>
<html>
<head>
  <title>Student Grades</title>
  <link rel="stylesheet" href="style.css">
</head>
<footer class="credit">
  Created by <b>OMAR MANSOUR</b>
</footer>
<body>

  <div class="card">
    <h1>Student Grades</h1>

    <input id="name" type="text" placeholder="Student name">

    <input id="arabic" type="number" placeholder="Arabic grade">
    <input id="english" type="number" placeholder="English grade">
    <input id="math" type="number" placeholder="Math grade">
    <input id="physics" type="number" placeholder="Physics grade">
    <input id="chemistry" type="number" placeholder="Chemistry grade">
    <input id="sport" type="number" placeholder="Sport grade">
    <input id="biology" type="number" placeholder="Biology grade">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
