<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM Grade System</title>
  <link rel="stylesheet" href="style.css?v=30">
</head>

<body>

  <nav class="navbar">
    <div class="brand-logo">
      <div class="logo-icon">OM</div>
      <div>
        <span class="logo-text"><b class="om">OM</b> Grade System</span>
        <span class="logo-sub">Student Calculator</span>
      </div>
    </div>

    <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
  </nav>

  <!-- LOGIN -->
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h2>OM Grade System</h2>

      <button onclick="studentEnter()">Student</button>

      <input id="studentLoginName" type="text" placeholder="Enter your name">
      <button onclick="studentEnter()">Show My Grades</button>

      <hr>

      <h3>Teacher</h3>
      <input id="loginPassword" type="password" placeholder="Password">
      <button onclick="teacherEnter()">Login</button>
    </div>
  </div>

  <!-- APP -->
  <main id="app" class="container" style="display:none;">
    <div class="card">

      <input id="name" type="text" placeholder="Student name">

      <div id="studentArea">
        <button onclick="searchStudent()">Search Student</button>
      </div>

      <div id="teacherArea" style="display:none;">
        <div class="subjects">
          <label><input type="checkbox" value="Math"> Math</label>
          <label><input type="checkbox" value="English"> English</label>
          <label><input type="checkbox" value="Arabic"> Arabic</label>
        </div>

        <button onclick="showInputs()">Next</button>
        <div id="gradeInputs"></div>
      </div>

      <div id="result"></div>

    </div>
  </main>

  <footer>Created by OMAR MANSOUR</footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script src="script.js?v=30"></script>

</body>
</html>
