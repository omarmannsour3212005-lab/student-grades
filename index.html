<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OM Grade System</title>
  <link rel="stylesheet" href="style.css">

  <!-- مهم جداً للموبايل -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="brand-logo">
      <div class="logo-icon">OM</div>
      <div>
        <span class="logo-text">OM Grade System</span>
        <span class="logo-sub">Student Calculator</span>
      </div>
    </div>

    <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
  </nav>

  <!-- LOGIN -->
  <div id="loginPage" class="login-page">
    <div class="login-box">

      <h2>OM Grade System</h2>

      <div class="login-buttons">
        <button onclick="setLoginMode('student')">Student</button>
        <button onclick="setLoginMode('teacher')">Teacher Login</button>
        <button onclick="showSignup()">Sign Up</button>
      </div>

      <input id="loginName" type="text" placeholder="Enter your name">
      <input id="loginPassword" type="password" placeholder="Password (Teacher only)">

      <button onclick="login()">Login</button>

      <p class="hint">Student does not need password</p>

    </div>
  </div>

  <!-- APP -->
  <main id="app" class="container" style="display:none;">
    <div class="card">

      <h1>OM Grade System</h1>

      <input id="name" type="text" placeholder="Student name">

      <!-- STUDENT -->
      <div id="studentArea">
        <button onclick="searchStudent()">Search Student</button>
      </div>

      <!-- TEACHER -->
      <div id="teacherArea">

        <div class="subjects">
          <label><input type="checkbox" value="Math"> Math</label>
          <label><input type="checkbox" value="English"> English</label>
          <label><input type="checkbox" value="Arabic"> Arabic</label>
          <label><input type="checkbox" value="Hebrew"> Hebrew</label>
        </div>

        <button onclick="showInputs()">Next</button>

        <div id="gradeInputs"></div>

        <h3>Teacher Dashboard</h3>
        <div id="teacherTable"></div>

      </div>

      <div id="result"></div>
      <canvas id="gradesChart"></canvas>

    </div>
  </main>

  <footer>
    Created by <b>OMAR MANSOUR</b>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

</body>
</html>
